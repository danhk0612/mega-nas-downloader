<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MEGA NAS Downloader</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">Personal NAS Tool</p>
          <h1>MEGA NAS Downloader</h1>
        </div>
        <div id="healthBadge" class="badge">확인 중</div>
      </header>

      <section class="summary-grid" aria-label="상태 요약">
        <article>
          <span>다운로드 중</span>
          <strong id="runningCount">0</strong>
        </article>
        <article>
          <span>대기</span>
          <strong id="pendingCount">0</strong>
        </article>
        <article>
          <span>완료</span>
          <strong id="completedCount">0</strong>
        </article>
        <article>
          <span>실패</span>
          <strong id="failedCount">0</strong>
        </article>
      </section>

      <section class="panel">
        <h2>새 다운로드</h2>
        <form id="downloadForm" class="download-form">
          <label>
            MEGA 공개 링크
            <textarea id="megaUrl" rows="5" placeholder="https://mega.nz/file/...&#10;https://mega.nz/folder/..." required></textarea>
          </label>
          <label>
            작업 이름
            <input id="jobName" type="text" placeholder="선택 사항" />
          </label>
          <label>
            하위 폴더
            <input id="subfolder" type="text" placeholder="선택 사항" />
          </label>
          <button type="submit">등록</button>
        </form>
        <p id="formMessage" class="form-message" role="status"></p>
      </section>

      <section class="panel">
        <h2>작업 목록</h2>
        <div id="jobs" class="jobs-list"></div>
      </section>

      <section class="panel">
        <h2>시스템 진단</h2>
        <dl id="diagnostics" class="diagnostics"></dl>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
